name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skills:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Lint skills and agents
        run: python3 scripts/lint_skills.py
      - name: Dry-run install
        run: bash install.sh --dry-run

  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          ERROR_FOUND=0
          DIRS=("linting")

          for DIR in "${DIRS[@]}"; do
            if [ ! -d "$DIR" ]; then
              echo "⚠️ Directory $DIR does not exist. Skipping."
              continue
            fi

            echo "ℹ️ Checking directory: $DIR"

            sh_files=$(find "$DIR" -type f -name "*.sh")
            if [ -z "$sh_files" ]; then
              echo "No .sh files found in $DIR"
              continue
            fi

            for file in $sh_files; do
              echo "ℹ️ Checking $file..."
              shellcheck --severity=warning "$file" || ERROR_FOUND=1
            done
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All shell scripts passed important ShellCheck checks!"
          else
            echo "❌ ShellCheck found important issues!"
            exit 1
          fi

  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: |
          set -euo pipefail
          ERROR_FOUND=0

          if [ ! -f ".markdownlint.yml" ]; then
            echo "::error::Config file .markdownlint.yml not found"
            exit 1
          fi

          mapfile -t md_files < <(find . -type f -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./_site/*" \
            -not -path "./.git/*" \
            -not -path "./tasks/*")

          if [ ${#md_files[@]} -eq 0 ]; then
            echo "No .md files found. Skipping."
            exit 0
          fi

          for file in "${md_files[@]}"; do
            echo "Checking ${file#./}..."
            markdownlint "$file" || ERROR_FOUND=1
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "All markdown files passed markdownlint checks!"
          else
            echo "markdownlint found issues!"
            exit 1
          fi

  yamllint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          set -euo pipefail
          ERROR_FOUND=0

          if [ ! -f ".yamllint.yml" ]; then
            echo "::error::Config file .yamllint.yml not found"
            exit 1
          fi

          mapfile -t yaml_files < <(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            -not -name ".yamllint.yml")

          if [ ${#yaml_files[@]} -eq 0 ]; then
            echo "No YAML files found. Skipping."
            exit 0
          fi

          for file in "${yaml_files[@]}"; do
            echo "Checking ${file#./}..."
            yamllint "$file" || ERROR_FOUND=1
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "All YAML files passed yamllint checks!"
          else
            echo "yamllint found issues!"
            exit 1
          fi

  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          set -euo pipefail
          py_files=$(find scripts/ -name "*.py" -not -path "*/__pycache__/*")
          if [ -z "$py_files" ]; then
            echo "No Python files found in scripts/. Skipping."
            exit 0
          fi
          # shellcheck disable=SC2086
          ruff check $py_files

  shfmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shfmt
        run: |
          curl -sSL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
          shfmt --version
      - name: Run shfmt
        run: |
          set -euo pipefail
          # Scope: linting/**/*.sh, excluding linting/preparation/ (pre-existing violations).
          # Baseline suppressions: install.sh, scripts/*.sh, and linting/preparation/*.sh
          # have pre-existing formatting violations. See follow-up tasks for fixes.
          sh_files=$(find linting/ -name "*.sh" \
            -not -path "*/preparation/*" \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ -z "$sh_files" ]; then
            echo "No shell script files found in linting/. Skipping."
            exit 0
          fi
          # shellcheck disable=SC2086
          shfmt -d -i 2 -ci $sh_files

  codespell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install codespell
        run: pip install codespell
      - name: Run codespell
        run: codespell skills/ agents/ docs/ README.md README.ru.md CONTRIBUTING.md

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch-depth: 0 scans the full commit history of the PR, not just HEAD.
          # This is intentional — gitleaks is most useful when it can see all commits
          # in a PR, not just the latest one. The template repo is small, so this is fast.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is not required for open-source repositories.

  json-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Syntax check — all JSON files
        run: |
          set -euo pipefail
          ERROR_FOUND=0
          # Collect all JSON files in tracked locations
          mapfile -t json_files < <(find mcp/ -name "*.json" -o -name "*.example" \
            | grep -E '\.(json|example)$' || true)
          # .claude/settings*.json (settings.local.json is gitignored, not present in CI)
          mapfile -t settings_files < <(find .claude/ -maxdepth 1 -name "settings*.json" \
            2>/dev/null || true)
          all_files=("${json_files[@]}" "${settings_files[@]}")
          if [ ${#all_files[@]} -eq 0 ]; then
            echo "No JSON files found — skipping syntax check."
            exit 0
          fi
          for file in "${all_files[@]}"; do
            echo "Syntax: $file"
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              python3 -m json.tool "$file" || true
              echo "::error file=$file::JSON syntax error"
              ERROR_FOUND=1
            fi
          done
          if [ "$ERROR_FOUND" -ne 0 ]; then
            echo "JSON syntax errors found."
            exit 1
          fi
          echo "All JSON files passed syntax check."
      - name: Schema check — .claude/settings*.json
        run: |
          set -euo pipefail
          SCHEMA_URL="https://json.schemastore.org/claude-code-settings.json"
          SCHEMA_FILE="$(mktemp)"
          # Download schema (fail fast if unreachable — schema check is mandatory)
          curl -sSfL "$SCHEMA_URL" -o "$SCHEMA_FILE"

          ERROR_FOUND=0
          mapfile -t settings_files < <(find .claude/ -maxdepth 1 -name "settings*.json" \
            2>/dev/null || true)
          if [ ${#settings_files[@]} -eq 0 ]; then
            echo "No .claude/settings*.json found — schema check skipped."
            exit 0
          fi
          for file in "${settings_files[@]}"; do
            echo "Schema: $file"
            python3 - "$file" "$SCHEMA_FILE" <<'PYEOF' || ERROR_FOUND=1
          import json, sys, pathlib
          try:
              import jsonschema
          except ImportError:
              print("jsonschema not installed", file=sys.stderr)
              sys.exit(1)

          instance_path, schema_path = sys.argv[1], sys.argv[2]
          instance = json.loads(pathlib.Path(instance_path).read_text())
          schema = json.loads(pathlib.Path(schema_path).read_text())
          try:
              jsonschema.validate(instance=instance, schema=schema)
          except jsonschema.ValidationError as e:
              path = " -> ".join(str(p) for p in e.absolute_path)
              print(f"Schema error in {instance_path}:", file=sys.stderr)
              print(f"  Path: {path or '(root)'}", file=sys.stderr)
              print(f"  Message: {e.message}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          done
          if [ "$ERROR_FOUND" -ne 0 ]; then
            echo "JSON schema errors found."
            exit 1
          fi
          echo "All settings files passed schema check."

  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ./actionlint -color .github/workflows/*.yml

  branch-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Labels are included in the default pull_request event payload —
    # no additional permissions are needed beyond contents: read.
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name policy
        env:
          HEAD_REF: ${{ github.head_ref }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          PATTERN='^issues-[0-9]+$'
          SKIP_LABEL='skip-branch-policy'

          # Check for skip label (for external fork PRs)
          if echo "$LABELS" | python3 -c "
          import json, sys
          labels = json.load(sys.stdin)
          sys.exit(0 if '$SKIP_LABEL' in labels else 1)
          " 2>/dev/null; then
            echo "skipped: label '$SKIP_LABEL' present"
            exit 0
          fi

          if [[ "$HEAD_REF" =~ $PATTERN ]]; then
            echo "branch name '$HEAD_REF' matches required pattern $PATTERN"
            exit 0
          else
            echo "branch name '$HEAD_REF' does not match required pattern $PATTERN (see _contract.md)"
            exit 1
          fi

  lint-commands:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Lint command files
        run: python3 scripts/lint_commands.py

  install-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run install.sh into isolated CLAUDE_HOME
        run: |
          set -euo pipefail
          CLAUDE_HOME="$(mktemp -d)"
          export CLAUDE_HOME
          echo "CLAUDE_HOME=$CLAUDE_HOME" >> "$GITHUB_ENV"

          bash install.sh

          # Save the list of expected symlinks to a tmp file for the uninstall assert step.
          # We collect them now — while the repo state is fixed — so the second step
          # doesn't depend on directory enumeration after checkout could theoretically change.
          SYMLINK_LIST="$(mktemp)"
          echo "SYMLINK_LIST=$SYMLINK_LIST" >> "$GITHUB_ENV"

          shopt -s nullglob
          ERRORS=0
          for cat in skills agents commands hooks; do
            for entry in "$cat"/*; do
              name="$(basename "$entry")"
              dst="$CLAUDE_HOME/$cat/$name"
              if ! test -L "$dst"; then
                echo "missing symlink: $dst (expected symlink for $cat/$name)"
                ERRORS=$((ERRORS + 1))
              else
                # Record for uninstall assertion
                echo "$dst" >> "$SYMLINK_LIST"
              fi
            done
          done
          shopt -u nullglob

          if [ "$ERRORS" -ne 0 ]; then
            echo "$ERRORS symlink(s) missing after install — see above"
            exit 1
          fi
          echo "All category symlinks verified."

      - name: Assert pre-push hook symlink
        run: |
          set -euo pipefail
          # install.sh links linting/pre-push-check.sh into .git/hooks/pre-push (the repo's
          # own git hooks dir), not into $CLAUDE_HOME/hooks/.
          if [ -d .git/hooks ]; then
            dst=".git/hooks/pre-push"
            if ! test -L "$dst"; then
              echo "missing symlink: $dst (expected pre-push hook symlink)"
              exit 1
            fi
            echo "pre-push hook symlink OK: $dst"
          else
            echo "pre-push hook step skipped: no .git/hooks"
          fi

      - name: Run doctor.sh
        run: |
          set -euo pipefail
          if ! output="$(bash scripts/doctor.sh 2>&1)"; then
            echo "doctor.sh exited non-zero. Full output:"
            echo "$output"
            exit 1
          fi
          echo "$output"

      - name: Uninstall and assert cleanup
        run: |
          set -euo pipefail
          bash install.sh --uninstall

          ERRORS=0
          while IFS= read -r dst; do
            if test -e "$dst" || test -L "$dst"; then
              echo "symlink not removed after uninstall: $dst"
              ERRORS=$((ERRORS + 1))
            fi
          done < "$SYMLINK_LIST"

          if [ "$ERRORS" -ne 0 ]; then
            echo "$ERRORS symlink(s) still present after uninstall — see above"
            exit 1
          fi
          echo "All symlinks removed by uninstall."

  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install markdown-link-check
        run: npm install -g markdown-link-check
      - name: Check links in Markdown files
        run: |
          set -euo pipefail
          mapfile -t md_files < <(find README.md README.ru.md CONTRIBUTING.md docs skills agents \
            -type f -name "*.md" \
            -not -path "*/tasks/*" \
            2>/dev/null || true)
          if [ ${#md_files[@]} -eq 0 ]; then
            echo "No Markdown files found — skipping."
            exit 0
          fi
          ERRORS=0
          for file in "${md_files[@]}"; do
            echo "Checking $file..."
            markdown-link-check --config .markdown-link-check.json --quiet "$file" || ERRORS=$((ERRORS + 1))
          done
          if [ "$ERRORS" -ne 0 ]; then
            echo "$ERRORS file(s) have broken links — see above"
            exit 1
          fi
          echo "All links OK."
