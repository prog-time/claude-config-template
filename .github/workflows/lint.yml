name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint skills and agents
        run: python3 scripts/lint_skills.py
      - name: Dry-run install
        run: bash install.sh --dry-run
